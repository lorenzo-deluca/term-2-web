services:
  ser2net:
    build: ./ser2net
    container_name: ser2web_ser2net
    privileged: true
    volumes:
      - /dev:/dev
      - ./data:/data
    ports:
      - "6666:6666"
    # restart:always ensures recovery even after a manual `docker stop` or host reboot.
    # Use `docker compose down` to intentionally stop all services.
    restart: always
    healthcheck:
      # Probe TCP port 6666 — if ser2net is not accepting connections it's considered unhealthy.
      test: ["CMD-SHELL", "nc -z localhost 6666 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    # Cap container log size to prevent filling the Raspberry Pi SD card.
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    mem_limit: 128m

  ttyd:
    build: ./ttyd
    container_name: ser2web_ttyd
    command: ttyd -W sh -c 'stty raw -echo; exec socat - TCP:ser2web_ser2net:6666'
    ports:
      - "7000:7681"
    depends_on:
      ser2net:
        condition: service_healthy
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    mem_limit: 64m

    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.serial-logs.rule=PathPrefix(`/serial-logs`)"
      - "traefik.http.routers.serial-logs.entrypoints=web"
      - "traefik.http.routers.serial-logs.priority=10"
      - "traefik.http.routers.serial-logs.middlewares=serial-logs-strip"
      - "traefik.http.middlewares.serial-logs-strip.stripPrefix.prefixes=/serial-logs"
      - "traefik.http.services.serial-logs.loadbalancer.server.port=7000"

  web-ui:
    build: ./web
    container_name: ser2web_web
    privileged: true
    volumes:
      - /dev:/dev
      - ./data:/data
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "5001:5000"
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:5000/api/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    mem_limit: 256m

    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.web-ui.rule=PathPrefix(`/web-ui`)"
      - "traefik.http.routers.web-ui.entrypoints=web"
      - "traefik.http.routers.web-ui.priority=10"
      - "traefik.http.routers.web-ui.middlewares=web-ui-strip"
      - "traefik.http.middlewares.web-ui-strip.stripPrefix.prefixes=/web-ui"
      - "traefik.http.services.web-ui.loadbalancer.server.port=5001"

  watchdog:
    build: ./watchdog
    container_name: ser2web_watchdog
    volumes:
      - ./data:/data
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "8888:8888"
    environment:
      - TRACE_FILE=/data/esp32_serial.trace
      - WATCHDOG_LOG_FILE=/data/watchdog.log
      - SER2NET_CONTAINER=ser2web_ser2net
      # Number of seconds with no serial data before triggering a ser2net restart.
      # Increase this if your device legitimately has long silent periods.
      - SILENCE_THRESHOLD_SEC=60
      - CHECK_INTERVAL_SEC=10
      - WATCHDOG_HTTP_PORT=8888
    depends_on:
      - ser2net
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8888/ping || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "3"
    mem_limit: 64m
