[unix_http_server]
file=/tmp/supervisor.sock

[supervisord]
nodaemon=true
logfile=/data/supervisord.log
pidfile=/tmp/supervisord.pid

[rpcinterface:supervisor]
supervisor.rpcinterface_factory = supervisor.rpcinterface:make_main_rpcinterface

[supervisorctl]
serverurl=unix:///tmp/supervisor.sock

[program:cron]
command=/usr/sbin/cron -f
autostart=true
autorestart=true

[program:webapp]
command=python3 /app/app.py
autostart=true
autorestart=true

[program:ser2net]
command=/usr/sbin/ser2net -n -c /data/ser2net.yaml
autostart=true
autorestart=true

[program:ttyd]
command=/usr/bin/ttyd -p 8080 telnet 127.0.0.1 3333
autostart=true
autorestart=true